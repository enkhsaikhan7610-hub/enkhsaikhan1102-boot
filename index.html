<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>УРАН ХИЙЦ | 3D Luxury Footwear</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){ emailjs.init("nfT3fjYlvh2OVOO5W"); })();
    </script>
</head>
<body>

<nav class="nav-header">
    <img src="https://i.postimg.cc/PrZQPYHB/Luxury-Footwear-Logo.png" class="nav-logo">
</nav>

<section id="products">
    <h2 class="section-title">Манай бүтээгдэхүүн</h2>
    <div id="product-list">
        <div class="product-card">
            <model-viewer src="shoe.glb" poster="https://i.postimg.cc/PrZQPYHB/Luxury-Footwear-Logo.png" alt="3D Shoe" auto-rotate camera-controls ar shadow-intensity="1" style="width: 100%; height: 300px; background: #0a0a0a;"></model-viewer>
            <div class="card-content">
                <h4>Сонгодог 3D Лофер</h4>
                <div style="color:#d4af37;">250,000₮</div>
                <input type="number" min="0" placeholder="Тоо ширхэг" oninput="updateCart(0, this.value)">
            </div>
        </div>
    </div>
</section>

<section class="order-container">
    <h2 class="section-title">ЗАХИАЛГА ӨГӨХ</h2>
    <div class="order-form">
        <input type="text" id="p-name" placeholder="Таны нэр" oninput="calc()">
        <input type="tel" id="p-phone" placeholder="Утасны дугаар" oninput="calc()">
        <input type="email" id="p-email" placeholder="Имэйл хаяг" oninput="calc()">
        <label class="checkbox-label">
            <input type="checkbox" id="del-check" onchange="calc()"> Хүргэлт авах (+15,000₮)
        </label>
        <input type="text" id="address" placeholder="Хүргэлтийн хаяг" style="display:none;" oninput="calc()">
    </div>
</section>

<div id="paymentModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center;">
    <div style="background: #111; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #d4af37;">
        <h3 style="color: #d4af37;">ТӨЛБӨР ТӨЛӨХ</h3>
        <p style="font-size: 14px; color: #ccc;">Захиалга баталгаажуулахын тулд төлбөрөө шилжүүлнэ үү.</p>
        
        <div style="background: #1a1a1a; padding: 15px; border-radius: 12px; margin: 15px 0; text-align: left;">
            <p style="margin: 5px 0;"><b>Банк:</b> Хаан Банк</p>
            <p style="margin: 5px 0;"><b>Данс:</b> 5070000000 (Жишээ)</p>
            <p style="margin: 5px 0;"><b>Хүлээн авагч:</b> Б. Энхсайхан</p>
            <p style="margin: 5px 0;"><b>Утга:</b> <span id="order-id-display" style="color:#d4af37;"></span></p>
        </div>

        <img src="https://i.postimg.cc/Qx8LpXzN/qpay-qr-placeholder.png" alt="Qpay QR" style="width: 150px; margin: 10px 0;">
        <p style="font-size: 12px; color: #777;">Qpay-ээр уншуулах боломжтой</p>
        
        <button onclick="window.location.reload()" style="width: 100%; padding: 12px; background: #d4af37; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px;">ХААХ</button>
    </div>
</div>

<div class="footer-bar">
    <div class="total-info"><span class="label">НИЙТ ТӨЛӨХ</span> <span id="res-total" class="amount">0</span>₮</div>
    <button id="submit-btn" class="checkout-btn" disabled onclick="sendOrder()">ЗАХИАЛАХ</button>
</div>

<script src="script.js"></script>
</body>
</html>
