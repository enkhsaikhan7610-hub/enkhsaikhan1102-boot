<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>УРАН ХИЙЦ | Luxury Store</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init("nfT3fjYlvh2OVOO5W"); 
       })();
    </script>

    <style>
        :root { --gold: #d4af37; --bg: #000; --card: #111; --red: #ff4d4d; --green: #25D366; }
        body { background-color: var(--bg); color: #fff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding-bottom: 120px; }
        
        .nav-header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 20px; background: #111; border-bottom: 1px solid #222; 
            position: sticky; top: 0; z-index: 100; 
        }
        .nav-logo { height: 35px; }
        .nav-right { display: flex; gap: 15px; align-items: center; }
        
        .cart-icon-btn { position: relative; background: none; border: none; cursor: pointer; padding: 5px; }
        .cart-count { 
            position: absolute; top: -5px; right: -5px; background: var(--red); 
            color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; font-weight: bold;
        }

        .main-img-holder { width: 100%; aspect-ratio: 1/1; overflow: hidden; background: #000; }
        .main-img-holder img { width: 100%; height: 100%; object-fit: cover; }
        
        .thumb-scroll { display: flex; gap: 8px; overflow-x: auto; padding: 15px; scrollbar-width: none; }
        .thumb-item { width: 70px; height: 70px; border-radius: 8px; flex-shrink: 0; cursor: pointer; opacity: 0.6; border: 2px solid transparent; }
        .thumb-active { border-color: var(--gold); opacity: 1; }

        .info-section { padding: 20px; }
        .product-title { font-size: 18px; font-weight: bold; margin-bottom: 5px; }
        .price-box { margin-bottom: 15px; }
        .current-price { font-size: 24px; font-weight: 800; color: var(--gold); }

        .selection-box { background: #1a1a1a; padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px solid #333; }
        .size-options { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .size-btn { background: #000; border: 1px solid #444; color: #fff; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
        .size-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.1); }

        .add-to-cart-btn { 
            width: 100%; background: #fff; color: #000; border: none; padding: 15px; 
            border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        /* Сагсны цонх */
        .cart-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 1000; display: none; flex-direction: column;
        }
        .cart-content { padding: 20px; flex: 1; overflow-y: auto; }
        .cart-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px; background: #111; border-radius: 10px; margin-bottom: 10px; border: 1px solid #222;
        }
        .remove-btn { color: var(--red); background: none; border: none; font-size: 20px; cursor: pointer; }

        .order-form { padding: 20px; background: #111; border-top: 1px solid #222; }
        .order-form input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; background: #222; border: 1px solid #333; color: #fff; box-sizing: border-box; }

        .footer-bar { position: fixed; bottom: 0; width: 100%; background: #111; padding: 20px; border-top: 1px solid #222; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .checkout-btn { background: var(--gold); color: #000; border: none; padding: 15px 30px; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<nav class="nav-header">
    <img src="https://i.postimg.cc/PrZQPYHB/Luxury-Footwear-Logo.png" class="nav-logo">
    <div class="nav-right">
        <a href="videos.html" style="color:var(--gold); text-decoration:none; font-size:12px;">БИЧЛЭГ</a>
        <button class="cart-icon-btn" onclick="toggleCart()">
            <span style="font-size: 20px;">🛒</span>
            <span id="cart-count-val" class="cart-count">0</span>
        </button>
    </div>
</nav>

<div class="product-container">
    <div class="main-img-holder">
        <img id="main-view" src="https://i.postimg.cc/PrZQPYHB/Luxury-Footwear-Logo.png">
    </div>

    <div class="thumb-scroll">
        <img class="thumb-item thumb-active" src="https://i.postimg.cc/PrZQPYHB/Luxury-Footwear-Logo.png" onclick="changeImg(this)">
        <img class="thumb-item" src="https://picsum.photos/600/600?random=1" onclick="changeImg(this)">
        <img class="thumb-item" src="https://picsum.photos/600/600?random=2" onclick="changeImg(this)">
    </div>

    <div class="info-section">
        <h1 class="product-title">Uran Khiits - Арьсан Гутал</h1>
        <div class="price-box">
            <span class="current-price">250,000₮</span>
        </div>

        <div class="selection-box">
            <span style="font-size: 12px; color: #777;">ХЭМЖЭЭ СОНГОХ:</span>
            <div class="size-options">
                <button class="size-btn" onclick="selectSize(this)">38</button>
                <button class="size-btn" onclick="selectSize(this)">39</button>
                <button class="size-btn" onclick="selectSize(this)">40</button>
                <button class="size-btn" onclick="selectSize(this)">41</button>
                <button class="size-btn" onclick="selectSize(this)">42</button>
            </div>
            <button class="add-to-cart-btn" onclick="addToCart()">САГСАНД НЭМЭХ</button>
        </div>
    </div>
</div>

<div id="cartOverlay" class="cart-overlay">
    <div style="padding: 20px; display: flex; justify-content: space-between; border-bottom: 1px solid #222;">
        <h3>Миний сагс</h3>
        <button onclick="toggleCart()" style="background:none; border:none; color:#fff; font-size:24px;">✕</button>
    </div>
    
    <div id="cartItems" class="cart-content">
        </div>

    <div class="order-form">
        <input type="text" id="p-name" placeholder="Таны нэр">
        <input type="tel" id="p-phone" placeholder="Утасны дугаар">
        <div style="display:flex; justify-content:space-between; margin-top:10px;">
            <span>Нийт:</span>
            <span id="cart-total" style="color:var(--gold); font-weight:bold;">0₮</span>
        </div>
        <button class="add-to-cart-btn" style="background:var(--gold);" onclick="sendOrder()">ЗАХИАЛГА ИЛГЭЭХ</button>
    </div>
</div>

<script>
let cart = [];
let selectedSize = "";
const unitPrice = 250000;

function changeImg(el) {
    document.getElementById('main-view').src = el.src;
    document.querySelectorAll('.thumb-item').forEach(t => t.classList.remove('thumb-active'));
    el.classList.add('thumb-active');
}

function selectSize(btn) {
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedSize = btn.innerText;
}

function addToCart() {
    if(!selectedSize) { alert("Хэмжээгээ сонгоно уу"); return; }
    
    const item = { size: selectedSize, price: unitPrice, id: Date.now() };
    cart.push(item);
    updateCartUI();
    alert("Сагсанд нэмэгдлээ!");
}

function updateCartUI() {
    document.getElementById('cart-count-val').innerText = cart.length;
    const container = document.getElementById('cartItems');
    container.innerHTML = "";
    
    let total = 0;
    cart.forEach(item => {
        total += item.price;
        container.innerHTML += `
            <div class="cart-item">
                <div>
                    <div>Арьсан гутал</div>
                    <div style="font-size:12px; color:var(--gold);">Хэмжээ: ${item.size}</div>
                </div>
                <div style="display:flex; align-items:center; gap:15px;">
                    <span>${item.price.toLocaleString()}₮</span>
                    <button class="remove-btn" onclick="removeItem(${item.id})">×</button>
                </div>
            </div>
        `;
    });
    document.getElementById('cart-total').innerText = total.toLocaleString() + "₮";
}

function removeItem(id) {
    cart = cart.filter(i => i.id !== id);
    updateCartUI();
}

function toggleCart() {
    const el = document.getElementById('cartOverlay');
    el.style.display = el.style.display === 'flex' ? 'none' : 'flex';
}

function sendOrder() {
    const name = document.getElementById('p-name').value;
    const phone = document.getElementById('p-phone').value;

    if(cart.length === 0) { alert("Сагс хоосон байна"); return; }
    if(!name || !phone) { alert("Мэдээллээ бүрэн бөглөнө үү"); return; }

    const details = cart.map(i => `Хэмжээ: ${i.size}`).join(", ");
    const params = {
        from_name: name,
        phone: phone,
        order_details: `Сагсны захиалга: ${details}`,
        total_price: document.getElementById('cart-total').innerText
    };

    emailjs.send('service_izdours', 'template_ix01rik', params)
    .then(() => {
        alert("Захиалга амжилттай илгээгдлээ!");
        cart = [];
        updateCartUI();
        toggleCart();
    });
}
</script>
</body>
</html>
