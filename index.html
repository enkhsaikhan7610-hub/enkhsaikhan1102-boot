<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>УРАН ХИЙЦ | Luxury Store</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init("nfT3fjYlvh2OVOO5W"); 
       })();
    </script>

    <style>
        :root { --gold: #d4af37; --bg: #000; --card: #111; --red: #ff4d4d; --green: #25D366; }
        body { background-color: var(--bg); color: #fff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding-bottom: 120px; }
        
        /* Навбар хэсэгт БИЧЛЭГ ҮЗЭХ товчийг нэмсэн */
        .nav-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px 20px; 
            background: #111; 
            border-bottom: 1px solid #222; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }
        .nav-logo { height: 35px; }
        .video-link-btn { 
            color: var(--gold); 
            text-decoration: none; 
            border: 1px solid var(--gold); 
            padding: 6px 12px; 
            border-radius: 8px; 
            font-size: 11px; 
            font-weight: bold;
            transition: 0.3s;
        }
        .video-link-btn:hover {
            background: rgba(212, 175, 55, 0.1);
        }

        .main-img-holder { width: 100%; aspect-ratio: 1/1; overflow: hidden; background: #000; position: relative; }
        .main-img-holder img, .main-img-holder video { width: 100%; height: 100%; object-fit: cover; }
        
        .thumb-scroll { display: flex; gap: 8px; overflow-x: auto; padding: 15px; scrollbar-width: none; }
        .thumb-item { width: 70px; height: 70px; border-radius: 8px; flex-shrink: 0; cursor: pointer; border: 2px solid transparent; object-fit: cover; opacity: 0.6; }
        .thumb-active { border-color: var(--gold); opacity: 1; }

        .info-section { padding: 20px; }
        .product-title { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .price-box { display: flex; align-items: center; gap: 15px; margin: 15px 0; }
        .current-price { font-size: 24px; font-weight: 800; color: var(--gold); }
        .old-price { font-size: 16px; color: #777; text-decoration: line-through; }

        .selection-box { background: #1a1a1a; padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px solid #333; }
        .select-label { display: block; font-size: 12px; color: #777; margin-bottom: 8px; text-transform: uppercase; }
        .size-options { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        .size-btn { background: #000; border: 1px solid #444; color: #fff; padding: 10px 15px; border-radius: 8px; cursor: pointer; }
        .size-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.1); }
        
        .qty-control { display: flex; align-items: center; gap: 20px; }
        .qty-btn { background: #333; border: none; color: #fff; width: 35px; height: 35px; border-radius: 50%; font-size: 20px; cursor: pointer; }
        #qty-val { font-size: 18px; font-weight: bold; }

        .order-card { background: var(--card); border-radius: 20px; padding: 25px; margin: 20px; border: 1px solid #222; }
        .order-card input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #333; background: #1a1a1a; color: #fff; box-sizing: border-box; }
        
        .footer-bar { position: fixed; bottom: 0; width: 100%; background: #111; padding: 20px; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; box-sizing: border-box; z-index: 100; }
        .checkout-btn { background: var(--gold); color: #000; border: none; padding: 15px 40px; border-radius: 15px; font-weight: bold; cursor: pointer; width: 60%; }
        .checkout-btn:disabled { background: #333; color: #777; opacity: 0.5; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #111; padding: 30px; border-radius: 25px; width: 90%; max-width: 400px; text-align: center; border: 1px solid var(--gold); }
        .payment-btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .confirm-btn { background: var(--green); color: #000; }
        .close-btn { background: #222; color: #777; font-size: 12px; }
    </style>
</head>
<body>

<nav class="nav-header">
    <img src="https://i.postimg.cc/PrZQPYHB/Luxury-Footwear-Logo.png" class="nav-logo">
    <a href="videos.html" class="video-link-btn">БИЧЛЭГ ҮЗЭХ</a>
</nav>

<div class="main-img-holder">
    <img id="main-view" src="https://i.postimg.cc/PrZQPYHB/Luxury-Footwear-Logo.png" style="display: block;">
    
    <video id="main-video" style="display: none;" muted loop playsinline>
        <source src="8a8170ee-0295-4169-8b55-b41bb0f8d7ea.mp4" type="video/mp4">
    </video>
</div>

    <div class="thumb-scroll">
        <div class="thumb-item thumb-active" onclick="showVideo()" style="background: #222; display: flex; align-items: center; justify-content: center; color: var(--gold); font-size: 10px; font-weight: bold; text-align: center;">VIDEO</div>
        <img class="thumb-item" src="https://i.postimg.cc/PrZQPYHB/Luxury-Footwear-Logo.png" onclick="changeImg(this)">
        <img class="thumb-item" src="https://picsum.photos/600/600?random=1" onclick="changeImg(this)">
        <img class="thumb-item" src="https://picsum.photos/600/600?random=2" onclick="changeImg(this)">
    </div>

    <div class="info-section">
        <h1 class="product-title">Uran Khiits - Арьсан Гутал</h1>
        <div class="price-box">
            <span class="current-price">250,000₮</span>
            <span class="old-price">500,000₮</span>
        </div>

        <div class="selection-box">
            <label class="select-label">Хэмжээ сонгох (Size)</label>
            <div class="size-options">
                <button class="size-btn" onclick="setSize(this)">36</button>
                <button class="size-btn" onclick="setSize(this)">37</button>
                <button class="size-btn" onclick="setSize(this)">38</button>
                <button class="size-btn" onclick="setSize(this)">39</button>
                <button class="size-btn" onclick="setSize(this)">40</button>
                <button class="size-btn" onclick="setSize(this)">41</button>
                <button class="size-btn" onclick="setSize(this)">42</button>
            </div>
            <label class="select-label">Тоо ширхэг (Quantity)</label>
            <div class="qty-control">
                <button class="qty-btn" onclick="updateQty(-1)">-</button>
                <span id="qty-val">1</span>
                <button class="qty-btn" onclick="updateQty(1)">+</button>
            </div>
        </div>
    </div>

    <div class="order-card">
        <input type="text" id="p-name" placeholder="Таны нэр" oninput="validate()">
        <input type="tel" id="p-phone" placeholder="Утасны дугаар" oninput="validate()">
        <input type="email" id="p-email" placeholder="Имэйл хаяг (Заавал)" oninput="validate()">
        <label style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px; color: #ccc;">
            <input type="checkbox" id="del-check" onchange="calc()" style="width: 20px; height: 20px;"> 
            <span>Хүргэлт авах (+15,000₮)</span>
        </label>
        <input type="text" id="address" placeholder="Хүргэлтийн хаяг" style="display:none;" oninput="validate()">
    </div>
</div>

<div class="footer-bar">
    <div>
        <div style="font-size: 11px; color: #777;">НИЙТ ТӨЛӨХ</div>
        <span id="res-total" style="font-size: 20px; color: var(--gold); font-weight: bold;">250,000</span><span style="color:var(--gold);">₮</span>
    </div>
    <button id="submit-btn" class="checkout-btn" disabled onclick="sendOrder()">ЗАХИАЛАХ</button>
</div>

<div id="paymentModal" class="modal">
    <div class="modal-content">
        <h2 style="color: var(--gold); margin-bottom: 5px;">Захиалга бүртгэгдлээ</h2>
        <p style="font-size: 12px; color: #aaa; margin-bottom: 20px;">Төлбөр шилжүүлсний дараа баталгаажуулах товчийг дарна уу.</p>
        
        <div style="text-align: left; background: #000; padding: 15px; border-radius: 12px; border: 1px solid var(--gold); margin-bottom: 15px; font-size: 14px;">
            <div>Данс: <b>ХасБанк 5003793719</b></div>
            <div>Нэр: <b>Б.Энхсайхан</b></div>
            <div>Дүн: <b id="pay-total-val" style="color:var(--gold);">0₮</b></div>
            <div>Утга: <b id="pay-order-id" style="color:var(--green);">#UK-0000</b></div>
        </div>
        
        <img id="qr-img" src="" style="width: 160px; border-radius: 10px; margin-bottom: 15px;">
        
        <button id="confirm-pay-btn" class="payment-btn confirm-btn" onclick="confirmPayment()">ТӨЛБӨР ШИЛЖҮҮЛСЭН</button>
        <button class="payment-btn close-btn" onclick="window.location.reload()">ХААХ</button>
    </div>
</div>

<script>
let selectedSize = "";
let quantity = 1;
let currentOrderID = "";
const unitPrice = 250000;
const delFee = 15000;

function showVideo() {
    document.getElementById('main-video').style.display = 'block';
    document.getElementById('main-view').style.display = 'none';
    document.querySelectorAll('.thumb-item').forEach(t => t.classList.remove('thumb-active'));
    event.currentTarget.classList.add('thumb-active');
}

function changeImg(el) {
    document.getElementById('main-video').style.display = 'none';
    const mainImg = document.getElementById('main-view');
    mainImg.style.display = 'block';
    mainImg.src = el.src;
    document.querySelectorAll('.thumb-item').forEach(t => t.classList.remove('thumb-active'));
    el.classList.add('thumb-active');
}

function setSize(btn) {
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedSize = btn.innerText;
    validate();
}

function updateQty(val) {
    quantity = Math.max(1, quantity + val);
    document.getElementById('qty-val').innerText = quantity;
    calc();
}

function calc() {
    const isDel = document.getElementById('del-check').checked;
    document.getElementById('address').style.display = isDel ? 'block' : 'none';
    const total = (unitPrice * quantity) + (isDel ? delFee : 0);
    document.getElementById('res-total').innerText = total.toLocaleString();
    document.getElementById('pay-total-val').innerText = total.toLocaleString() + "₮";
    validate();
}

function validate() {
    const name = document.getElementById('p-name').value.trim();
    const phone = document.getElementById('p-phone').value.trim();
    const email = document.getElementById('p-email').value.trim();
    const isDel = document.getElementById('del-check').checked;
    const address = document.getElementById('address').value.trim();
    
    let canSubmit = name !== "" && phone.length >= 8 && email.includes('@') && selectedSize !== "";
    if(isDel && address === "") canSubmit = false;
    
    document.getElementById('submit-btn').disabled = !canSubmit;
}

function sendOrder() {
    const btn = document.getElementById('submit-btn');
    btn.innerText = "Илгээж байна...";
    btn.disabled = true;
    
    currentOrderID = '#UK-' + Math.floor(1000 + Math.random() * 9000);
    const params = {
        order_id: currentOrderID,
        from_name: document.getElementById('p-name').value,
        phone: document.getElementById('p-phone').value,
        user_email: document.getElementById('p-email').value,
        order_details: `Гутлын захиалга (Хэмжээ: ${selectedSize}, Тоо: ${quantity}ш) - ЗАХИАЛГА ҮҮССЭН`,
        address: document.getElementById('address').value || "Дэлгүүрээс авах",
        total_price: document.getElementById('res-total').innerText + "₮"
    };

    emailjs.send('service_izdours', 'template_ix01rik', params)
    .then(() => {
        document.getElementById('pay-order-id').innerText = currentOrderID;
        document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://u-khiits.mn/pay?id=${currentOrderID}`;
        document.getElementById('paymentModal').style.display = 'flex';
        btn.innerText = "ЗАХИАЛАХ";
        btn.disabled = false;
    });
}

function confirmPayment() {
    const btn = document.getElementById('confirm-pay-btn');
    btn.innerText = "Мэдэгдэж байна...";
    btn.disabled = true;

    const params = {
        order_id: currentOrderID,
        from_name: document.getElementById('p-name').value,
        phone: document.getElementById('p-phone').value,
        user_email: document.getElementById('p-email').value,
        order_details: `ТӨЛБӨР ТӨЛӨГДӨВ: Гутал (Хэмжээ: ${selectedSize}, Тоо: ${quantity}ш)`,
        address: document.getElementById('address').value || "Дэлгүүрээс авах",
        total_price: document.getElementById('res-total').innerText + "₮"
    };

    emailjs.send('service_izdours', 'template_ix01rik', params)
    .then(() => {
        alert("Төлбөр шилжүүлсэн тухай мэдэгдэл илгээгдлээ. Бид шалгаад баталгаажуулах болно. Баярлалаа!");
        window.location.reload();
    })
    .catch((err) => {
        alert("Алдаа гарлаа, та дахин оролдоно уу.");
        btn.disabled = false;
        btn.innerText = "ТӨЛБӨР ШИЛЖҮҮЛСЭН";
    });
}
</script>
</body>
</html>
