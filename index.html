<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>УРАН ХИЙЦ | Handmade Luxury Footwear</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init("nfT3fjYlvh2OVOO5W");
       })();
    </script>

    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        .nav-header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #111; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .nav-logo-small { height: 40px; }
        .brand-container { text-align: center; padding: 20px; }
        .main-logo { width: 100px; }
        .section-title { text-align: center; color: #d4af37; text-transform: uppercase; letter-spacing: 2px; margin: 20px 0 10px; }

        /* БҮТЭЭГДЭХҮҮНИЙ ЖАГСААЛТ */
        #product-list { 
            display: flex; 
            overflow-x: auto; 
            gap: 15px; 
            padding: 20px; 
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }

        /* Компьютер дээр нэг эгнээнд 5 харагдах тохиргоо */
        @media (min-width: 1024px) {
            #product-list {
                display: grid;
                grid-template-columns: repeat(5, 1fr); /* 5 багана */
                overflow-x: visible;
                scroll-snap-type: none;
                max-width: 1400px;
                margin: 0 auto;
            }
            .product-card { flex: none !important; width: 100% !important; }
        }

        .product-card { 
            flex: 0 0 280px; 
            background: #111; 
            border-radius: 20px; 
            overflow: hidden; 
            border: 1px solid #222; 
            scroll-snap-align: start;
        }
        .product-img { width: 100%; height: 350px; object-fit: cover; cursor: zoom-in; transition: 0.3s; }
        .product-img:hover { opacity: 0.8; }
        .card-content { padding: 15px; }
        .price-tag { color: #d4af37; font-weight: bold; font-size: 1.1em; display: block; margin-bottom: 10px; }
        
        .size-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .size-item { background: #1a1a1a; padding: 5px 2px; border-radius: 10px; text-align: center; border: 1px solid #333; }
        .size-item span { font-size: 10px; color: #777; display: block; }
        .size-item input { width: 90%; background: transparent; border: none; color: #fff; text-align: center; font-weight: bold; outline: none; font-size: 13px; }

        /* ЗУРАГ ТОМРУУЛАХ (LIGHTBOX) */
        #lightbox {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center;
        }
        #lightbox img { max-width: 90%; max-height: 80%; border-radius: 10px; border: 2px solid #d4af37; }
        .close-lightbox { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 40px; cursor: pointer; }

        /* Захиалгын хэсэг */
        .order-container { max-width: 450px; margin: 20px auto; padding: 20px; background: #111; border-radius: 25px; border: 1px solid #222; }
        .order-section input { width: 100%; padding: 15px 18px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 15px; outline: none; box-sizing: border-box; }
        
        .footer-bar { position: fixed; bottom: 0; width: 100%; background: #111; padding: 15px; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; box-sizing: border-box; z-index: 100; }
        .checkout-btn { background: #d4af37; color: #000; border: none; padding: 12px 30px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 15px; }
        .checkout-btn:disabled { opacity: 0.4; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal-content { background: #111; padding: 25px; border-radius: 20px; width: 100%; max-width: 380px; text-align: center; border: 1px solid #d4af37; }
    </style>
</head>
<body>

<nav class="nav-header">
    <div class="lang-toggle">
        <button onclick="setLang('mn')" style="background:none; color:#fff; border:none; cursor:pointer; font-weight:bold;">MN</button>
        <button onclick="setLang('en')" style="background:none; color:#777; border:none; cursor:pointer;">EN</button>
    </div>
    <img src="https://i.postimg.cc/PrZQPYHB/Luxury-Footwear-Logo.png" class="nav-logo-small">
    <div style="width: 40px;"></div>
</nav>

<div class="brand-container">
    <img src="https://i.postimg.cc/PrZQPYHB/Luxury-Footwear-Logo.png" class="main-logo">
</div>

<section id="products">
    <h2 class="section-title" id="t-products-title">Бүтээгдэхүүн</h2>
    <div id="product-list"></div>
</section>

<div id="lightbox" onclick="this.style.display='none'">
    <span class="close-lightbox">&times;</span>
    <img id="lightbox-img" src="">
</div>

<section id="order" style="padding: 0 15px;">
    <h2 class="section-title" id="t-order-title">Захиалга өгөх</h2>
    <div class="order-container">
        <div class="order-section">
            <input type="text" id="p-name" placeholder="Таны нэр" oninput="calc()">
            <input type="tel" id="p-phone" placeholder="Утасны дугаар" oninput="calc()">
            <input type="email" id="p-email" placeholder="Имэйл хаяг (Заавал)" oninput="calc()">
            <label style="display: flex; align-items: center; gap: 10px; font-size: 14px; color: #a0a0a0; margin: 10px 0;">
                <input type="checkbox" id="del-check" onchange="calc()" style="width: 18px; height: 18px;"> 
                <span id="t-need-del">Хүргэлт авах (+15,000₮)</span>
            </label>
            <input type="text" id="address" placeholder="Хүргэлтийн хаяг..." style="display:none;" oninput="calc()">
        </div>
    </div>
</section>

<div class="footer-bar">
    <div>
        <div style="font-size: 10px; color: #a0a0a0;" id="t-total-label">НИЙТ ТӨЛӨХ</div>
        <span id="res-total" style="font-size: 18px; color: #d4af37; font-weight: 800;">0</span><span style="color: #d4af37;">₮</span>
    </div>
    <button type="button" id="submit-btn" class="checkout-btn" disabled onclick="sendOrder()">ЗАХИАЛАХ</button>
</div>

<div id="paymentModal" class="modal">
    <div class="modal-content">
        <div style="font-size: 30px; color: #d4af37;">✓</div>
        <h3 style="color: #d4af37;">Захиалга бүртгэгдлээ</h3>
        <div style="text-align: left; background: #000; padding: 15px; border-radius: 12px; border: 1px solid #d4af37; margin: 15px 0; font-size: 13px;">
            <div>Данс: <b>ХасБанк 5003793719</b></div>
            <div>Нэр: <b>Б.Энхсайхан</b></div>
            <div>Дүн: <b id="pay-total-val">0₮</b></div>
            <div>Утга: <b id="pay-order-id" style="color:#25D366; font-size: 16px;">#UK-0000</b></div>
        </div>
        <img id="qr-img" src="" style="width: 120px; border: 2px solid #fff; border-radius: 8px; margin-bottom: 15px;">
        <button onclick="notifyPaymentSent()" style="width: 100%; padding: 12px; background: #d4af37; border: none; border-radius: 10px; font-weight: bold;">ТӨЛБӨР ШИЛЖҮҮЛСЭН</button>
    </div>
</div>

<script>
const unitPrice = 250000;
const delFee = 15000;
const sizes = [38, 39, 40, 41, 42, 43, 44];
let currentOrderID = "";
let cart = {};
let currentLang = 'mn';

const langData = {
    mn: { 
        products: "Бүтээгдэхүүн", order: "Захиалга өгөх", del: "Хүргэлт авах (+15,000₮)", total: "НИЙТ ТӨЛӨХ", btn: "ЗАХИАЛАХ",
        items: ["Сонгодог Лофер", "Монгол Гутал", "Ажлын Ботинк", "Оксфорд Гутал", "Чөлөөт Пүүз", "Хагас Түрийтэй", "Зуны Мокасин", "Спортын Хөнгөн", "Гоёлын Ботинк", "Өвлийн Дулаан"] 
    },
    en: { 
        products: "Products", order: "Order Now", del: "Delivery Service (+15,000₮)", total: "TOTAL", btn: "CHECKOUT",
        items: ["Classic Loafer", "Mongol Boot", "Work Boot", "Oxford Shoe", "Casual Sneaker", "Mid Boot", "Summer Moccasin", "Sport Light", "Dress Shoe", "Winter Warm"] 
    }
};

function setLang(lang) {
    currentLang = lang;
    document.getElementById('t-products-title').innerText = langData[lang].products;
    document.getElementById('t-order-title').innerText = langData[lang].order;
    document.getElementById('t-need-del').innerText = langData[lang].del;
    document.getElementById('t-total-label').innerText = langData[lang].total;
    document.getElementById('submit-btn').innerText = langData[lang].btn;
    renderProducts();
}

function renderProducts() {
    const list = document.getElementById('product-list');
    list.innerHTML = langData[currentLang].items.map((name, i) => {
        let sizeHtml = sizes.map(sz => {
            const key = `${i}-${sz}`;
            return `<div class="size-item"><span>${sz}</span><input type="number" min="0" placeholder="0" value="${cart[key] || ''}" oninput="updateCart('${key}', this.value)"></div>`;
        }).join('');
        const imgSrc = `https://picsum.photos/400/550?random=${i+50}`;
        return `
        <div class="product-card">
            <img class="product-img" src="${imgSrc}" onclick="openLightbox('${imgSrc}')">
            <div class="card-content">
                <h3>${name}</h3>
                <span class="price-tag">${unitPrice.toLocaleString()} ₮</span>
                <div class="size-grid">${sizeHtml}</div>
            </div>
        </div>`;
    }).join('');
}

function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').style.display = 'flex';
}

function updateCart(key, val) {
    const v = parseInt(val);
    if (isNaN(v) || v <= 0) delete cart[key];
    else cart[key] = v;
    calc();
}

function calc() {
    const isDel = document.getElementById('del-check').checked;
    const name = document.getElementById('p-name').value.trim();
    const phone = document.getElementById('p-phone').value.trim();
    const email = document.getElementById('p-email').value.trim();
    document.getElementById('address').style.display = isDel ? 'block' : 'none';
    let totalQty = 0;
    Object.values(cart).forEach(q => totalQty += q);
    const totalAmount = (totalQty * unitPrice) + (isDel && totalQty > 0 ? delFee : 0);
    document.getElementById('res-total').innerText = totalAmount.toLocaleString();
    const isEmailValid = email.includes('@') && email.includes('.');
    const canSubmit = totalQty > 0 && name.length > 1 && phone.length >= 8 && isEmailValid;
    document.getElementById('submit-btn').disabled = !canSubmit;
    document.getElementById('pay-total-val').innerText = totalAmount.toLocaleString() + "₮";
}

function sendOrder() {
    const btn = document.getElementById('submit-btn');
    btn.innerText = "Илгээж байна...";
    btn.disabled = true;
    currentOrderID = '#UK-' + Math.floor(1000 + Math.random() * 9000);
    let details = "";
    Object.keys(cart).forEach(k => {
        const [idx, sz] = k.split('-');
        details += `${langData[currentLang].items[idx]} (SZ:${sz}, ${cart[k]}ш); `;
    });
    const params = {
        order_id: currentOrderID,
        from_name: document.getElementById('p-name').value,
        phone: document.getElementById('p-phone').value,
        user_email: document.getElementById('p-email').value,
        order_details: details,
        address: document.getElementById('address').value || "Дэлгүүрээс авах",
        total_price: document.getElementById('res-total').innerText + "₮"
    };
    emailjs.send('service_izdours', 'g0dk3hw', params).then(() => {
        document.getElementById('pay-order-id').innerText = currentOrderID;
        document.getElementById('paymentModal').style.display = 'flex';
        document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=Bank:KhasBank|Acc:5003793719|Amount:${params.total_price}|Msg:${currentOrderID}`;
        btn.innerText = langData[currentLang].btn;
        btn.disabled = false;
    });
}

function notifyPaymentSent() {
    const params = {
        order_id: currentOrderID,
        from_name: document.getElementById('p-name').value,
        phone: document.getElementById('p-phone').value,
        user_email: document.getElementById('p-email').value,
        order_details: "ТӨЛБӨР ШИЛЖҮҮЛСЭН МЭДЭГДЭЛ"
    };
    emailjs.send('service_izdours', 'g0dk3hw', params).then(() => {
        alert("Захиалга амжилттай! Бид тантай холбогдох болно.");
        window.location.reload();
    });
}

window.onload = () => setLang('mn');
</script>
</body>
</html>
