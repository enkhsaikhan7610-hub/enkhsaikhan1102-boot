<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>УРАН ХИЙЦ | Luxury Store</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init("nfT3fjYlvh2OVOO5W"); 
       })();
    </script>

    <style>
        :root { --gold: #d4af37; --bg: #000; --card: #111; --red: #ff4d4d; }
        body { background-color: var(--bg); color: #fff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        
        .nav-header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 20px; background: #111; border-bottom: 1px solid #222; 
            position: sticky; top: 0; z-index: 100; 
        }
        .nav-logo { height: 35px; }
        
        .cart-icon-btn { position: relative; background: none; border: none; cursor: pointer; padding: 5px; }
        .cart-count { 
            position: absolute; top: -5px; right: -5px; background: var(--red); 
            color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; font-weight: bold;
        }

        /* ТОМ ЗУРАГ СВАЙП ХИЙХ ХЭСЭГ */
        .slider-container { width: 100%; aspect-ratio: 1/1; position: relative; overflow: hidden; touch-action: pan-y; }
        .slider-wrapper { display: flex; transition: transform 0.4s ease-out; width: 100%; height: 100%; }
        .slider-item { min-width: 100%; height: 100%; }
        .slider-item img { width: 100%; height: 100%; object-fit: cover; }

        /* ЖИЖИГ ЗУРГУУД */
        .product-list-scroll { 
            display: flex; gap: 10px; overflow-x: auto; padding: 15px; 
            background: #0a0a0a; border-bottom: 1px solid #222; scrollbar-width: none;
        }
        .product-thumb { 
            width: 65px; height: 65px; border-radius: 8px; flex-shrink: 0; 
            cursor: pointer; border: 2px solid transparent; transition: 0.2s; object-fit: cover; opacity: 0.5;
        }
        .product-thumb.active { border-color: var(--gold); opacity: 1; border-width: 3px; }

        .info-section { padding: 20px; }
        .product-title { font-size: 20px; font-weight: bold; margin-bottom: 5px; color: var(--gold); }
        .product-desc { font-size: 13px; color: #888; margin-bottom: 15px; }
        .current-price { font-size: 22px; font-weight: 800; }

        .selection-box { background: #151515; padding: 18px; border-radius: 12px; margin: 15px 0; border: 1px solid #222; }
        .size-options { display: flex; gap: 6px; flex-wrap: wrap; margin: 10px 0 15px 0; }
        .size-btn { background: #000; border: 1px solid #333; color: #fff; padding: 10px 12px; border-radius: 6px; cursor: pointer; min-width: 42px; font-size: 13px;}
        .size-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.1); }

        .qty-control-main { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; background: #000; padding: 8px 12px; border-radius: 8px; width: fit-content; border: 1px solid #222; }
        .qty-btn-main { background: #222; border: none; color: #fff; width: 32px; height: 32px; border-radius: 6px; cursor: pointer; font-size: 18px; }
        
        .add-to-cart-btn { width: 100%; background: #fff; color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .cart-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: none; flex-direction: column; }
        .cart-content { padding: 20px; flex: 1; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #111; border-radius: 10px; margin-bottom: 10px; border: 1px solid #222; }
        .remove-btn { color: var(--red); background: none; border: 1px solid var(--red); padding: 4px 8px; border-radius: 4px; font-size: 12px; }

        .order-form { padding: 20px; background: #111; border-top: 1px solid #222; }
        .order-form input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; background: #222; border: 1px solid #333; color: #fff; box-sizing: border-box; }
    </style>
</head>
<body>

<nav class="nav-header">
    <img src="https://i.postimg.cc/PrZQPYHB/Luxury-Footwear-Logo.png" class="nav-logo">
    <div style="display:flex; gap:10px; align-items:center;">
        <a href="videos.html" style="color:var(--gold); text-decoration:none; font-size:11px; font-weight:bold; border:1px solid var(--gold); padding:4px 8px; border-radius:4px;">БИЧЛЭГ</a>
        <button class="cart-icon-btn" onclick="toggleCart()">
            <span>🛒</span><span id="cart-count-val" class="cart-count">0</span>
        </button>
    </div>
</nav>

<div class="slider-container" id="slider">
    <div class="slider-wrapper" id="slider-wrapper">
        </div>
</div>

<div class="product-list-scroll" id="product-list"></div>

<div class="info-section">
    <h1 id="display-title" class="product-title">Сонгоогүй</h1>
    <p id="display-desc" class="product-desc">-</p>
    <div class="price-box">
        <span id="display-price" class="current-price">0₮</span>
    </div>

    <div class="selection-box">
        <span style="font-size:11px; color:#666;">ХЭМЖЭЭ СОНГОХ:</span>
        <div class="size-options">
            <button class="size-btn" onclick="selectSize(this)">38</button>
            <button class="size-btn" onclick="selectSize(this)">39</button>
            <button class="size-btn" onclick="selectSize(this)">40</button>
            <button class="size-btn" onclick="selectSize(this)">41</button>
            <button class="size-btn" onclick="selectSize(this)">42</button>
        </div>

        <span style="font-size:11px; color:#666;">ШИРХЭГ:</span>
        <div class="qty-control-main">
            <button class="qty-btn-main" onclick="updateMainQty(-1)">−</button>
            <span id="main-qty-val">0</span>
            <button class="qty-btn-main" onclick="updateMainQty(1)">+</button>
        </div>

        <button class="add-to-cart-btn" onclick="addToCart()">САГСАНД НЭМЭХ</button>
    </div>
</div>

<div id="cartOverlay" class="cart-overlay">
    <div style="padding:20px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #222;">
        <h3 style="margin:0;">Миний сагс</h3>
        <button onclick="toggleCart()" style="background:none; border:none; color:#fff; font-size:24px;">✕</button>
    </div>
    <div id="cartItems" class="cart-content"></div>
    <div class="order-form">
        <input type="text" id="p-name" placeholder="Таны нэр">
        <input type="tel" id="p-phone" placeholder="Утасны дугаар">
        <div style="display:flex; justify-content:space-between; margin:10px 0;">
            <span>Нийт:</span><span id="cart-total" style="color:var(--gold); font-weight:bold;">0₮</span>
        </div>
        <button class="add-to-cart-btn" style="background:var(--gold);" onclick="sendOrder()">ЗАХИАЛГА ИЛГЭЭХ</button>
    </div>
</div>

<script>
const products = [
    { id: 1, name: "Uran Black Leather", desc: "Classic black leather shoes", price: 250000, img: "https://i.postimg.cc/PrZQPYHB/Luxury-Footwear-Logo.png" },
    { id: 2, name: "Uran Brown Style", desc: "Handmade brown leather", price: 260000, img: "https://via.placeholder.com/600x600/111/gold?text=GUTAL+2" },
    { id: 3, name: "Uran Oxford Elite", desc: "Premium office wear", price: 270000, img: "https://via.placeholder.com/600x600/111/gold?text=GUTAL+3" },
    { id: 4, name: "Uran Loafer Pro", desc: "Comfortable daily loafer", price: 240000, img: "https://via.placeholder.com/600x600/111/gold?text=GUTAL+4" },
    { id: 5, name: "Uran Chelsea Black", desc: "Sleek fall style boots", price: 320000, img: "https://via.placeholder.com/600x600/111/gold?text=GUTAL+5" },
    { id: 6, name: "Uran Urban Soft", desc: "Soft skin leather shoes", price: 230000, img: "https://via.placeholder.com/600x600/111/gold?text=GUTAL+6" },
    { id: 7, name: "Uran Monk Strap", desc: "Double strap luxury", price: 290000, img: "https://via.placeholder.com/600x600/111/gold?text=GUTAL+7" },
    { id: 8, name: "Uran Formal Blue", desc: "Unique blue leather", price: 280000, img: "https://via.placeholder.com/600x600/111/gold?text=GUTAL+8" },
    { id: 9, name: "Uran Casual Grey", desc: "Lightweight leather sneakers", price: 220000, img: "https://via.placeholder.com/600x600/111/gold?text=GUTAL+9" },
    { id: 10, name: "Uran Masterpiece", desc: "Limited edition artisan", price: 450000, img: "https://via.placeholder.com/600x600/111/gold?text=GUTAL+10" }
];

let cart = [];
let selectedSize = "";
let currentQty = 0;
let currentIndex = 0;

const wrapper = document.getElementById('slider-wrapper');
const thumbList = document.getElementById('product-list');

// Үүсгэх
products.forEach((p, idx) => {
    // Slider-т нэмэх
    const slide = document.createElement('div');
    slide.className = 'slider-item';
    slide.innerHTML = `<img src="${p.img}">`;
    wrapper.appendChild(slide);

    // Жижиг жагсаалтад нэмэх
    const thumb = document.createElement('img');
    thumb.src = p.img;
    thumb.className = 'product-thumb';
    thumb.onclick = () => goToSlide(idx);
    thumbList.appendChild(thumb);
});

function goToSlide(index) {
    currentIndex = index;
    wrapper.style.transform = `translateX(-${currentIndex * 100}%)`;
    updateUI();
}

function updateUI() {
    const p = products[currentIndex];
    document.getElementById('display-title').innerText = p.name;
    document.getElementById('display-desc').innerText = p.desc;
    document.getElementById('display-price').innerText = p.price.toLocaleString() + "₮";
    
    document.querySelectorAll('.product-thumb').forEach((t, i) => {
        t.classList.toggle('active', i === currentIndex);
    });
    
    currentQty = 0;
    document.getElementById('main-qty-val').innerText = "0";
}

// Swipe Logic
let startX = 0;
const slider = document.getElementById('slider');

slider.addEventListener('touchstart', e => startX = e.touches[0].clientX);
slider.addEventListener('touchend', e => {
    let diff = startX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) {
        if (diff > 0 && currentIndex < products.length - 1) goToSlide(currentIndex + 1);
        else if (diff < 0 && currentIndex > 0) goToSlide(currentIndex - 1);
    }
});

// Анхны төлөв
goToSlide(0);

// Бусад функцууд (Сагс, Хэмжээ...)
function selectSize(btn) {
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedSize = btn.innerText;
}

function updateMainQty(val) {
    currentQty = Math.max(0, currentQty + val);
    document.getElementById('main-qty-val').innerText = currentQty;
}

function addToCart() {
    if(!selectedSize || currentQty === 0) { alert("Сонгоно уу"); return; }
    const p = products[currentIndex];
    const cartId = `${p.id}-${selectedSize}`;
    const idx = cart.findIndex(i => i.cartId === cartId);
    if(idx > -1) cart[idx].qty += currentQty;
    else cart.push({ cartId, name: p.name, size: selectedSize, price: p.price, qty: currentQty });
    updateCartUI(); alert("Нэмэгдлээ");
}

function updateCartUI() {
    document.getElementById('cart-count-val').innerText = cart.reduce((s, i) => s + i.qty, 0);
    const container = document.getElementById('cartItems');
    container.innerHTML = ""; let total = 0;
    cart.forEach(item => {
        total += item.price * item.qty;
        container.innerHTML += `<div class="cart-item">
            <div><b>${item.name}</b><br><small>${item.size}р | ${item.qty}ш</small></div>
            <div style="text-align:right;">${(item.price * item.qty).toLocaleString()}₮<br><button class="remove-btn" onclick="removeItem('${item.cartId}')">Устгах</button></div>
        </div>`;
    });
    document.getElementById('cart-total').innerText = total.toLocaleString() + "₮";
}

function removeItem(id) { cart = cart.filter(i => i.cartId !== id); updateCartUI(); }
function toggleCart() { const el = document.getElementById('cartOverlay'); el.style.display = el.style.display === 'flex' ? 'none' : 'flex'; }

function sendOrder() {
    const name = document.getElementById('p-name').value;
    const phone = document.getElementById('p-phone').value;
    if(!name || !phone || cart.length === 0) return alert("Мэдээллээ гүйцэд оруулна уу");
    emailjs.send('service_izdours', 'template_ix01rik', {
        from_name: name, phone: phone, 
        order_details: cart.map(i => `${i.name} (${i.size}-${i.qty}ш)`).join(", "),
        total_price: document.getElementById('cart-total').innerText
    }).then(() => { alert("Илгээгдлээ"); cart = []; updateCartUI(); toggleCart(); });
}
</script>
</body>
</html>
