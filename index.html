<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>УРАН ХИЙЦ | Handmade Luxury Footwear</title>
    <link rel="stylesheet" href="style.css">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          // ТАНЫ PUBLIC KEY
          emailjs.init("nfT3fjYlvh2OVOO5W");
       })();
    </script>
</head>
<body>

<nav class="nav-header">
    <div class="lang-toggle" style="display: flex; gap: 15px; margin-left: 15px;">
        <a href="javascript:void(0)" id="btn-mn" onclick="setLang('mn')">MN</a>
        <a href="javascript:void(0)" id="btn-en" onclick="setLang('en')">EN</a>
    </div>
    <img src="https://i.postimg.cc/PrZQPYHB/Luxury-Footwear-Logo.png" class="nav-logo-small" alt="Logo">
    <a href="#products" id="t-nav-products" style="margin-right: 15px;">Бүтээгдэхүүн</a>
</nav>

<div class="brand-container">
    <img src="https://i.postimg.cc/PrZQPYHB/Luxury-Footwear-Logo.png" class="main-logo" alt="УРАН ХИЙЦ">
</div>

<section id="products">
    <h2 class="section-title" id="t-products-title">Бүтээгдэхүүн</h2>
    <div id="product-list"></div>
</section>

<section id="order">
    <h2 class="section-title" id="t-order-title">Захиалга өгөх</h2>
    <div class="order-section">
        <input type="text" id="p-name" placeholder="Таны нэр (Заавал)" oninput="calc()">
        <input type="tel" id="p-phone" placeholder="Утасны дугаар (Заавал)" oninput="calc()">
        
        <input type="email" id="p-email" placeholder="Имэйл хаяг (Захиалгын хуулбар авахад заавал)" oninput="calc()" 
               style="border: 1px solid #d4af37; background: rgba(212, 175, 55, 0.05); color: #fff;">
        
        <label style="display: flex; align-items: center; gap: 10px; font-size: 14px; cursor: pointer; margin: 15px 0; color: #a0a0a0;">
            <input type="checkbox" id="del-check" onchange="calc()" style="width: 18px; height: 18px;"> 
            <span id="t-need-del">Хүргэлт авах (+15,000₮)</span>
        </label>
        
        <input type="text" id="address" placeholder="Хүргэлтийн хаяг (Дүүрэг, хороо, байр)" style="display:none;" oninput="calc()">
    </div>
</section>

<div class="footer-bar">
    <div>
        <div style="font-size: 10px; color: #a0a0a0;" id="t-total-label">НИЙТ ТӨЛӨХ</div>
        <span id="res-total" style="font-size: 20px; color: #d4af37; font-weight: 800;">0</span><span style="font-size: 18px; color: #d4af37;">₮</span>
    </div>
    <button type="button" id="submit-btn" class="checkout-btn" disabled onclick="sendOrder()">ЗАХИАЛАХ</button>
</div>

<div id="paymentModal" class="modal">
    <div class="modal-content" id="modal-body">
        <div id="success-icon" style="font-size: 40px; color: #d4af37; margin-bottom: 10px;">✓</div>
        <h2 style="color: #d4af37; font-size: 18px; margin-bottom: 5px;">Захиалга бүртгэгдлээ</h2>
        <p style="font-size: 12px; color: #a0a0a0; margin-bottom: 20px;">Захиалгын баримтыг таны имэйл рүү илгээлээ.</p>
        
        <div style="text-align: left; background: #000; padding: 15px; border-radius: 15px; border: 1px solid #d4af37; margin-bottom: 15px;">
            <div style="font-size: 12px; margin-bottom: 5px; color: #777;">Төлбөр хүлээн авах:</div>
            <div style="font-size: 13px; margin-bottom: 8px;">Данс: <b>ХасБанк 5003793719</b></div>
            <div style="font-size: 13px; margin-bottom: 8px;">Нэр: <b>Б.Энхсайхан</b></div>
            <div style="font-size: 13px; margin-bottom: 8px;">Дүн: <b id="pay-total-val" style="color:#d4af37;">0₮</b></div>
            <div style="font-size: 15px;">Гүйлгээний утга: <b id="pay-order-id" style="color:#25D366; font-size: 18px;">#UK-0000</b></div>
        </div>
        
        <p style="font-size: 11px; color: #ffcc00; margin-bottom: 15px;">⚠️ Гүйлгээний утга дээр <b>Захиалгын дугаарыг</b> заавал бичнэ үү.</p>
        
        <img id="qr-img" src="" alt="QR" style="width: 140px; border-radius: 10px; border: 4px solid white; margin-bottom: 15px;">
        
        <button type="button" id="payment-sent-btn" onclick="notifyPaymentSent()" style="width: 100%; padding: 15px; background: #d4af37; color: #000; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 14px;">
            ТӨЛБӨР ШИЛЖҮҮЛСЭН
        </button>
        
        <button type="button" onclick="closeAll()" style="margin-top: 15px; background: transparent; color: #777; border: none; cursor: pointer; text-decoration: underline; font-size: 12px;">Хаах</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
