<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>УРАН ХИЙЦ | Видео Хичээлүүд</title>
    <style>
        :root { --gold: #d4af37; --bg: #000; --card: #111; }
        body { background-color: var(--bg); color: #fff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; }
        
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
        .back-btn { color: #fff; text-decoration: none; font-size: 20px; border: 1px solid #333; padding: 5px 15px; border-radius: 10px; }
        
        .video-grid { display: grid; grid-template-columns: 1fr; gap: 25px; max-width: 800px; margin: 0 auto; }
        .video-card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid #222; }
        .video-info { padding: 15px; }
        .video-title { font-size: 16px; font-weight: bold; color: var(--gold); margin-bottom: 5px; }
        .video-desc { font-size: 13px; color: #777; }
        
        video { width: 100%; display: block; background: #000; }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html" class="back-btn">←</a>
    <h1 style="font-size: 20px; margin: 0;">Видео Хичээлүүд</h1>
</div>

<div class="video-grid">
    <div class="video-card">
        <video controls poster="https://i.postimg.cc/PrZQPYHB/Luxury-Footwear-Logo.png">
            <source src="videos/gutal_hiih_1.mp4" type="video/mp4">
            Таны хөтөч видеог дэмжихгүй байна.
        </video>
        <div class="video-info">
            <div class="video-title">Гутал яаж хийгддэг вэ? (1-р хэсэг)</div>
            <div class="video-desc">Арьс зүсэх болон хэв гаргах явц.</div>
        </div>
    </div>

    <div class="video-card">
        <video controls>
            <source src="videos/gutal_hiih_2.mp4" type="video/mp4">
        </video>
        <div class="video-info">
            <div class="video-title">Уран хийц - Оёдол болон угсралт</div>
            <div class="video-desc">Гутлын ул болон дээд хэсгийг нэгтгэх технологи.</div>
        </div>
    </div>
</div>

</body>
</html>
